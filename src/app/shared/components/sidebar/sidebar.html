<!-- Sidebar usando el componente HlmSidebarImports de Spartan -->
<div hlm-sidebar class="sidebar-container" [class.collapsed]="collapsed">
  <!-- Sidebar Header -->
  <div hlm-sidebar-header class="sidebar-header">
    <div hlm-sidebar-brand class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-leaf"></i>
      </div>
      <div class="logo-text" *ngIf="!collapsed">
        <h2>NUTRE</h2>
        <p>WELLNESS PLATFORM</p>
      </div>
    </div>
    <button
      hlm-sidebar-trigger
      hlmBtn
      variant="ghost"
      size="sm"
      class="toggle-btn"
      (click)="toggleSidebar()"
    >
      <i [class]="collapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left'"></i>
    </button>
  </div>

  <!-- User Profile Section -->
  <div hlm-sidebar-content class="sidebar-content">
    <!-- Perfil de usuario expandido -->
    <div class="user-profile" *ngIf="!collapsed">
      <div class="user-avatar">
        <img
          src="https://ui-avatars.com/api/?name=Admin&background=00E6A0&color=0A0C10&bold=true"
          alt="Avatar"
        />
        <div class="user-status"></div>
      </div>
      <div class="user-info">
        <h4>Administrador</h4>
        <p>admin@nutre.com</p>
      </div>
    </div>

    <!-- Avatar colapsado -->
    <div class="user-profile-collapsed" *ngIf="collapsed">
      <div class="user-avatar">
        <img
          src="https://ui-avatars.com/api/?name=Admin&background=00E6A0&color=0A0C10&bold=true"
          alt="Avatar"
        />
        <div class="user-status"></div>
      </div>
    </div>

    <hlm-separator />

    <!-- Navegación principal -->
    <nav hlm-sidebar-nav class="sidebar-nav">
      <div class="nav-section" *ngIf="!collapsed">Principal</div>

      <div hlm-sidebar-item class="nav-link">
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link-content"
          (click)="setView('overview')"
        >
          <i class="fas fa-chart-pie"></i>
          <span *ngIf="!collapsed">Dashboard</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/clients" routerLinkActive="active" class="nav-link-content" (click)="onNavClick($event, 'clients')">
          <i class="fas fa-users"></i>
          <span *ngIf="!collapsed">Clientes</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/planes" routerLinkActive="active" class="nav-link-content" (click)="onNavClick($event, 'nutrition')">
          <i class="fas fa-calendar-alt"></i>
          <span *ngIf="!collapsed">Planes Nutricionales</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="!collapsed">Gestión</div>

      <div hlm-sidebar-item class="nav-link">
        <a href="#" class="nav-link-content" (click)="onNavClick($event, 'recipes')">
          <i class="fas fa-utensils"></i>
          <span *ngIf="!collapsed">Recetas</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a href="#" class="nav-link-content" (click)="onNavClick($event, 'appointments')">
          <i class="fas fa-calendar-check"></i>
          <span *ngIf="!collapsed">Citas</span>
          <span class="badge" *ngIf="!collapsed">8</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a href="#" class="nav-link-content" (click)="onNavClick($event, 'payments')">
          <i class="fas fa-credit-card"></i>
          <span *ngIf="!collapsed">Pagos</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="!collapsed">Producción</div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/produccion" routerLinkActive="active" class="nav-link-content">
          <i class="fas fa-boxes"></i>
          <span *ngIf="!collapsed">Órdenes de Producción</span>
        </a>
      </div>

      <div class="nav-section" *ngIf="!collapsed">Logística</div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/delivery/dealer" routerLinkActive="active" class="nav-link-content">
          <i class="fas fa-user"></i>
          <span *ngIf="!collapsed">Repartidores</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/delivery/entregas" routerLinkActive="active" class="nav-link-content">
          <i class="fas fa-box"></i>
          <span *ngIf="!collapsed">Entregas</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/delivery/route" routerLinkActive="active" class="nav-link-content">
          <i class="fas fa-route"></i>
          <span *ngIf="!collapsed">Rutas</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a routerLink="/delivery/delivery-detail" routerLinkActive="active" class="nav-link-content">
          <i class="fas fa-map-marker-alt"></i>
          <span *ngIf="!collapsed">Detalle de Entrega</span>
        </a>
      </div>
      <div class="nav-section" *ngIf="!collapsed">Analytics</div>

      <div hlm-sidebar-item class="nav-link">
        <a href="#" class="nav-link-content" (click)="onNavClick($event, 'reports')">
          <i class="fas fa-chart-line"></i>
          <span *ngIf="!collapsed">Reportes</span>
        </a>
      </div>

      <div hlm-sidebar-item class="nav-link">
        <a href="#" class="nav-link-content" (click)="onNavClick($event, 'settings')">
          <i class="fas fa-cog"></i>
          <span *ngIf="!collapsed">Configuración</span>
        </a>
      </div>
    </nav>

    <hlm-separator />

    <!-- Footer con logout -->
    <div hlm-sidebar-footer class="sidebar-footer">
       <!--<button hlmBtn variant="destructive" class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="!collapsed">Cerrar Sesión</span>
      </button>-->
    </div>
  </div>
</div>
