<div class="dealer-page">


  <main class="main">


    <div class="content">
      <div class="view-header">
        <h1>Repartidores</h1>
        <button hlmBtn (click)="openNewDealerDialog()">
          <i class="fas fa-plus"></i> Nuevo Repartidor
        </button>
      </div>

      <div class="table-card">
        <table class="data-table">
          <thead>
            <tr>
               <th>carnet</th>
              <th>Nombre</th>
              <th>Teléfono</th>

              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let dealer of dealers">

              <td>{{ dealer.identityCard }}</td>
              <td>{{ dealer.fullName }}</td>

              <td>{{ dealer.cellPhone }}</td>



            </tr>

            <!-- 🔹 si no hay datos -->
            <tr *ngIf="dealers.length === 0">
              <td colspan="3" style="text-align:center;">
                No hay repartidores
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div *ngIf="showDealerDialog" class="dialog-overlay" (click)="closeDealerDialog()">
      <div class="dialog-content" (click)="$event.stopPropagation()">
        <div class="dialog-header">
          <h2>{{ editingDealer ? 'Editar' : 'Nuevo' }} Repartidor</h2>
          <button class="close-btn" (click)="closeDealerDialog()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="dialog-body">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" [(ngModel)]="newDealer.nombre" placeholder="Nombre completo">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="text" [(ngModel)]="newDealer.telefono" placeholder="Teléfono">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="newDealer.email" placeholder="Email">
          </div>
          <div class="form-group">
            <label>Licencia de Conducir</label>
            <input type="text" [(ngModel)]="newDealer.licencia" placeholder="Número de licencia">
          </div>
          <div class="form-group">
            <label>Vehículo</label>
            <select [(ngModel)]="newDealer.vehiculo">
              <option value="">Seleccionar vehículo</option>
              <option value="Motocicleta">Motocicleta</option>
              <option value="Bicicleta">Bicicleta</option>
              <option value="Coche">Coche</option>
            </select>
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select [(ngModel)]="newDealer.estado">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
        </div>
        <div class="dialog-footer">
          <button hlmBtn variant="outline" (click)="closeDealerDialog()">Cancelar</button>
          <button hlmBtn (click)="saveDealer()">Guardar</button>
        </div>
      </div>
    </div>
  </main>
</div>
