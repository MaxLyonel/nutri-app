<div class="route-container">
  <div class="header">
    <h1>Rutas de Entrega</h1>
    <button hlmBtn (click)="openCreateDialog()">
      <i class="fas fa-plus"></i> Crear Ruta
    </button>
  </div>

  <div class="table-section">
    <table class="rutas-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Repartidor</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        @for (ruta of rutas; track ruta.id) {
          <tr>
            <td>{{ ruta.id }}</td>
            <td>{{ formatFecha(ruta.fecha) }}</td>
            <td>{{ ruta.dealer?.nombre }}</td>
            <td>
              <span class="estado-badge" [class]="ruta.estado">
                {{ getEstadoLabel(ruta.estado) }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  @if (showCreateDialog) {
    <div class="dialog-overlay" (click)="closeCreateDialog()">
      <div class="dialog" (click)="$event.stopPropagation()">
        <h2>Crear Ruta de Entrega</h2>
        
        <div class="form-group">
          <label>Fecha</label>
          <input 
            type="date" 
            [(ngModel)]="newRuta.fecha"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>Repartidor</label>
          <select [(ngModel)]="newRuta.dealer" class="form-input">
            <option [ngValue]="null" disabled>Selecciona un repartidor</option>
            @for (dealer of dealers; track dealer.id) {
              <option [ngValue]="dealer">{{ dealer.nombre }}</option>
            }
          </select>
        </div>

        <div class="dialog-actions">
          <button hlmBtn variant="outline" (click)="closeCreateDialog()">
            Cancelar
          </button>
          <button hlmBtn (click)="createRuta()">
            Crear Ruta
          </button>
        </div>
      </div>
    </div>
  }
</div>
